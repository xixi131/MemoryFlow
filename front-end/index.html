<!DOCTYPE html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemoryFlow</title>
    <link rel="icon" type="image/png" href="/logo-memoryflow.png" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#3A7FF1", 
              "primary-glow": "#60A5FA",
              "background-dark": "#0F172A",
              "surface-dark": "#1E293B", 
              "surface-light": "#334155", 
              "text-secondary": "#94A3B8",
              "accent-coral": "#FF6F61",
              "accent-green": "#4CAF50",
            },
            fontFamily: {
              "display": ["Plus Jakarta Sans", "Noto Sans SC", "sans-serif"],
              "body": ["Plus Jakarta Sans", "Noto Sans SC", "sans-serif"],
              "mono": ["JetBrains Mono", "monospace"],
            },
            borderRadius: {
              "xl": "1.5rem",
              "2xl": "2rem", 
              "3xl": "2.5rem",
              "pill": "9999px",
            },
            boxShadow: {
              "glow": "0 0 20px -5px rgba(58, 127, 241, 0.5)",
              "inner-light": "inset 0 1px 1px 0 rgba(255, 255, 255, 0.05)",
            }
          },
        },
      }
    </script>
    <style>
      body {
        font-family: 'Plus Jakarta Sans', 'Noto Sans SC', sans-serif;
        /* Global smooth transition for theme switching */
        transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        background-color: transparent !important;
      }
      html {
        background-color: transparent !important;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #334155; 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569; 
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(226, 232, 240, 0.8);
        transition: background-color 0.5s, border-color 0.5s;
      }
      .dark .glass-panel {
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .modal-enter {
        animation: modal-pop 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes modal-pop {
        0% { opacity: 0; transform: scale(0.95) translateY(10px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      /* 灵动岛弹性收缩动画：先缩小到比目标更小，再回弹 */
      @keyframes squish-in {
        0% { transform: scale(1); }
        60% { transform: scale(0.85); } /* 收缩得更明显一点 */
        80% { transform: scale(1.02); } /* 轻微反弹 */
        100% { transform: scale(1); }
      }
      /* 灵动岛弹性展开动画：展开过程 -> 变大(Overshoot) -> 变小(Undershoot) -> 恢复 */
      @keyframes squish-out {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); } /* 变大 */
        75% { transform: scale(0.96); } /* 变小 */
        100% { transform: scale(1); }   /* 恢复 */
      }
      .animate-squish-in {
        animation: squish-in 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .animate-squish-out {
        animation: squish-out 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      
      /* Shimmer Effect for Verification Text */
      @keyframes shimmer-text {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      .animate-text-shimmer {
        animation: shimmer-text 2s linear infinite;
      }
    </style>

<link rel="stylesheet" href="/index.css">
</head>
  <body class="">
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
