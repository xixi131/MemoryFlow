server:
  port: 8080
  servlet:
    context-path: /api
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  frontend-url: ${APP_FRONTEND_URL:https://memoryflow.tanxhub.com}

file:
  upload-dir: ./uploads/avatars/

spring:
  application:
    name: memoryflow
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:file:./uploads/config/application-${spring.profiles.active}.yml

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/memory-flow?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000       # 5分钟 (默认600000=10分钟)
      pool-name: MemoryFlowHikariCP
      max-lifetime: 600000       # 10分钟 (缩短以避免防火墙切断连接)
      connection-timeout: 30000
      keepalive-time: 30000      # 30秒检查一次连接活跃状态

  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
      db-config:
        id-type: auto
        logic-delete-field: deleted
    mapper-locations: classpath*:/mapper/**/*.xml
    type-aliases-package: com.memoryflow.entity

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      timeout: 30000ms # Increased timeout from 10s to 30s
      lettuce:
        pool:
          max-active: 50 # Increased max active connections
          max-idle: 20   # Increased max idle
          min-idle: 5
          max-wait: 5000ms # Set explicit max wait
          time-between-eviction-runs: 30s
        shutdown-timeout: 200ms

  mail:
    host: ${SPRING_MAIL_HOST:smtp.163.com}
    port: ${SPRING_MAIL_PORT:465}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    protocol: ${SPRING_MAIL_PROTOCOL:smtp}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory

# JWT 配置
jwt:
  secret: ${JWT_SECRET:}
  access-token-expiration: 1800000    # 30分钟 (毫秒)
  refresh-token-expiration: 604800000  # 7天 (毫秒)
  issuer: MemoryFlow

# 安全配置
security:
  # 登录防暴力破解
  login:
    max-fail-count: 5        # 最大失败次数
    lock-duration: 300       # 锁定时长(秒) = 5分钟
  # 注册防刷
  register:
    max-count-per-hour: 3    # 同一IP每小时最多注册数

# 艾宾浩斯复习周期配置 (天数)
ebbinghaus:
  cycles:
    - 1     # Review 1: T + 1天
    - 2     # Review 2: T + 2天
    - 4     # Review 3: T + 4天
    - 7     # Review 4: T + 7天
    - 15    # Review 5: T + 15天
    - 30    # Review 6: T + 30天
    - 90    # Review 7: T + 90天
    - 180   # Review 8: T + 180天

# 日志配置
logging:
  level:
    root: INFO
    com.memoryflow: DEBUG
    com.memoryflow.mapper: DEBUG
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

cloudflare:
  turnstile:
    secret-key: ${CLOUDFLARE_TURNSTILE_SECRET_KEY:}
    site-verify-url: https://challenges.cloudflare.com/turnstile/v0/siteverify
