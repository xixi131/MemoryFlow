server:
  port: 8080
  servlet:
    context-path: /api

app:
  frontend-url: https://memoryflow.tanxhub.com

file:
  upload-dir: ./uploads/avatars/

spring:
  datasource:
    url: jdbc:mysql://YOUR_MYSQL_HOST:3306/memory-flow?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: YOUR_MYSQL_USERNAME
    password: YOUR_MYSQL_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: YOUR_REDIS_HOST
      port: 6379
      password: YOUR_REDIS_PASSWORD
      database: 0
      timeout: 30000ms
  mail:
    host: smtp.163.com
    port: 465
    username: YOUR_SMTP_USERNAME
    password: YOUR_SMTP_PASSWORD
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory

jwt:
  secret: YOUR_JWT_SECRET
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000
  issuer: MemoryFlow

cloudflare:
  turnstile:
    secret-key: YOUR_TURNSTILE_SECRET_KEY
    site-verify-url: https://challenges.cloudflare.com/turnstile/v0/siteverify
