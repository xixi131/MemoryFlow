name: Release

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_REPOSITORY: xixi131/MemoryFlow.exe

jobs:
  release:
    name: Publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Sync frontend version from tag
        shell: bash
        working-directory: front-end
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          NORMALIZED_TAG="${TAG_NAME#v}"

          node -e "
            const fs = require('fs');
            const version = process.env.NORMALIZED_TAG;
            const updateJson = (file, updater) => {
              const data = JSON.parse(fs.readFileSync(file, 'utf8'));
              updater(data);
              fs.writeFileSync(file, JSON.stringify(data, null, 2) + '\n');
            };

            updateJson('./package.json', (data) => {
              data.version = version;
            });

            updateJson('./package-lock.json', (data) => {
              data.version = version;
              if (data.packages && data.packages['']) {
                data.packages[''].version = version;
              }
            });
          "

          echo "RELEASE_VERSION=$NORMALIZED_TAG" >> "$GITHUB_ENV"

      - name: Check release token
        shell: bash
        env:
          GH_RELEASE_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          if [ -z "$GH_RELEASE_TOKEN" ]; then
            echo "Missing GH_RELEASE_TOKEN secret for $RELEASE_REPOSITORY" >&2
            exit 1
          fi

      - name: Install frontend dependencies
        working-directory: front-end
        run: npm ci

      - name: Build and publish Windows package
        working-directory: front-end
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run release:win
