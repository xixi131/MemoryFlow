name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Load release config
        id: release_config
        shell: bash
        working-directory: front-end
        run: |
          node -e "
            const fs = require('fs');
            const {
              RELEASE_REPOSITORY,
              RELEASE_TAG_PATTERN_SOURCE
            } = require('./electron/release-config.cjs');

            fs.appendFileSync(process.env.GITHUB_OUTPUT, \`release_repository=\${RELEASE_REPOSITORY}\\n\`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, \`release_tag_pattern=\${RELEASE_TAG_PATTERN_SOURCE}\\n\`);
          "

      - name: Validate release tag
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_TAG_PATTERN: ${{ steps.release_config.outputs.release_tag_pattern }}
        run: |
          node -e "
            const tag = process.env.TAG_NAME;
            const pattern = new RegExp(process.env.RELEASE_TAG_PATTERN);

            if (!pattern.test(tag)) {
              console.error(\`Invalid release tag: \${tag}\`);
              console.error('Expected format: vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease');
              process.exit(1);
            }
          "

      - name: Sync frontend version from tag
        shell: bash
        working-directory: front-end
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          NORMALIZED_TAG="${TAG_NAME#v}"

          node -e "
            const fs = require('fs');
            const version = process.env.NORMALIZED_TAG;
            const updateJson = (file, updater) => {
              const data = JSON.parse(fs.readFileSync(file, 'utf8'));
              updater(data);
              fs.writeFileSync(file, JSON.stringify(data, null, 2) + '\n');
            };

            updateJson('./package.json', (data) => {
              data.version = version;
            });

            updateJson('./package-lock.json', (data) => {
              data.version = version;
              if (data.packages && data.packages['']) {
                data.packages[''].version = version;
              }
            });
          "

          echo "RELEASE_VERSION=$NORMALIZED_TAG" >> "$GITHUB_ENV"

      - name: Check release token
        shell: bash
        env:
          GH_RELEASE_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          RELEASE_REPOSITORY: ${{ steps.release_config.outputs.release_repository }}
        run: |
          if [ -z "$GH_RELEASE_TOKEN" ]; then
            echo "Missing GH_RELEASE_TOKEN secret for $RELEASE_REPOSITORY" >&2
            exit 1
          fi

      - name: Install frontend dependencies
        working-directory: front-end
        run: npm ci

      - name: Build and publish Windows package
        working-directory: front-end
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run release:win
